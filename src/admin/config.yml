backend:
  name: git-gateway
  branch: main

# Lets you run the CMS locally with `npx decap-server` during development.
local_backend: true

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

site_url: "[SITE_URL]"
display_url: "[SITE_URL]"

collections:
  # ---------------------------------------------------------------
  # Recommendations: one entry per place (restaurants, beaches, etc.)
  # ---------------------------------------------------------------
  - name: "recommendations"
    label: "Recommendations"
    label_singular: "Recommendation"
    folder: "src/recommendations"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Restaurant", "Beach", "Attraction", "Bar & Nightlife", "Shopping", "Day Trip"]
      - { label: "Rating (0–5)", name: "rating", widget: "number", value_type: "int", min: 0, max: 5, required: false }
      - { label: "Short description", name: "description", widget: "text" }
      - { label: "Address", name: "address", widget: "string", required: false }
      - { label: "Google Maps link", name: "mapUrl", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  # ---------------------------------------------------------------
  # Local area: a single editable page about Calpe
  # ---------------------------------------------------------------
  - name: "local_area"
    label: "Local Area Page"
    files:
      - name: "local_area"
        label: "Local Area"
        file: "src/local-area/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Intro", name: "intro", widget: "text", required: false }
          - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/local-area/" }
          - { label: "Page CSS", name: "pageCss", widget: "hidden", default: "about" }
          - { label: "Body", name: "body", widget: "markdown" }

  # ---------------------------------------------------------------
  # Blog: optional travel tips
  # ---------------------------------------------------------------
  - name: "blog"
    label: "Blog"
    label_singular: "Post"
    folder: "src/blog"
    create: true
    slug: "{{pageName}}"
    fields:
      - { label: "Page name (dashes only)", name: "pageName", widget: "string" }
      - { label: "Post title", name: "blogTitle", widget: "string" }
      - { label: "Title tag (SEO)", name: "titleTag", widget: "string", required: false }
      - { label: "Description", name: "blogDescription", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", default: ["post"] }
      - { label: "Featured image", name: "image", widget: "image", required: false }
      - { label: "Image caption", name: "imageAlt", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
